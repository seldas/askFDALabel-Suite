# Helper to decide if we should redirect to HTTPS
# 1 = Redirect to HTTPS
# 0 = Do NOT redirect (stay on HTTP)
map "$http_x_forwarded_proto:$host" $should_redirect {
    # If already HTTPS, don't redirect
    "~^https:.*$" 0;
    
    # If Host ends with .trycloudflare.com, don't redirect (allow HTTP tunnel)
    "~^http:.*\.trycloudflare\.com$" 0;
    
    # Default for any other HTTP request: Redirect
    "~^http:.*$" 1;
    
    # Fallback for direct local access (no X-Forwarded-Proto)
    default 1;
}

server {
    listen 80;
    server_name _;

    location ^~ /askfdalabel_api/ {
        if ($should_redirect) {
            return 301 https://$host$request_uri;
        }
        
        rewrite ^/askfdalabel_api/(.*)$ /$1 break;
        proxy_pass http://backend:8842;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /askfdalabel_api;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_set_header Upgrade $http_upgrade;
    }

    location ^~ /askfdalabel {
        if ($should_redirect) {
            return 301 https://$host$request_uri;
        }

        proxy_pass http://frontend:8841;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /askfdalabel;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_set_header Upgrade $http_upgrade;
    }

    location = / {
        if ($should_redirect) {
            return 301 https://$host$request_uri;
        }
        return 302 /askfdalabel/;
    }

    location / {
        if ($should_redirect) {
            return 301 https://$host$request_uri;
        }
        return 302 /askfdalabel/;
    }
}

include /etc/nginx/conf.d/ssl_enabled.conf;
