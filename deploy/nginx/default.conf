# Helper to decide if we should redirect to HTTPS
map "$http_x_forwarded_proto:$host" $should_redirect {
    "~^https:.*$" 0;
    "~^http:.*\.trycloudflare\.com$" 0;
    "~^http:.*$" 1;
    default 1;
}

# WebSocket support map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    location ^~ /askfdalabel_api/ {
        if ($should_redirect) {
            return 301 https://$host$request_uri;
        }
        
        rewrite ^/askfdalabel_api/(.*)$ /$1 break;
        proxy_pass http://backend:8842;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /askfdalabel_api;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location ^~ /askfdalabel {
        if ($should_redirect) {
            return 301 https://$host$request_uri;
        }

        proxy_pass http://frontend:8841;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /askfdalabel;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_read_timeout 300s;
    }

    location = / {
        if ($should_redirect) {
            return 301 https://$host$request_uri;
        }
        return 302 /askfdalabel/;
    }

    location / {
        if ($should_redirect) {
            return 301 https://$host$request_uri;
        }
        return 302 /askfdalabel/;
    }
}

include /etc/nginx/conf.d/ssl_enabled.conf;
