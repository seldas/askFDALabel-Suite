server {
    listen 80;
    server_name _;

    # Redirect bare host to the frontend base path
    location = / {
        return 302 /askfdalabel/;
    }

    # Keep /askfdalabel without trailing slash friendly
    location = /askfdalabel {
        return 302 /askfdalabel/;
    }

    location /askfdalabel_api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /askfdalabel_api;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_set_header Upgrade $http_upgrade;
    }

    location /askfdalabel/ {
        proxy_pass http://frontend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /askfdalabel;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_set_header Upgrade $http_upgrade;
    }

    location /askfdalabel_api {
        return 302 /askfdalabel_api/;
    }
}
