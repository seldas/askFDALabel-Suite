server {
    listen 80;
    server_name _;

    # Redirect everything to HTTPS so nginx is the TLS terminator.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;
    ssl_certificate /etc/nginx/certs/askfdalabel.crt;
    ssl_certificate_key /etc/nginx/certs/askfdalabel.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Redirect bare host to the frontend base path
    location = / {
        return 302 /askfdalabel/;
    }

    # Keep /askfdalabel without trailing slash friendly
    location = /askfdalabel {
        return 302 /askfdalabel/;
    }

    location /askfdalabel_api/ {
        proxy_pass http://backend:8842;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /askfdalabel;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_set_header Upgrade $http_upgrade;
    }

    location /askfdalabel/ {
        proxy_pass http://frontend:8841;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /askfdalabel;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_set_header Upgrade $http_upgrade;
    }
}
