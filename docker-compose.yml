services:
  db:
    image: ankane/pgvector:latest
    container_name: askfdalabel-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: askfdalabel
      POSTGRES_USER: afd_user
      POSTGRES_PASSWORD: afd_password
    shm_size: '1gb'
    volumes:
      - ./database/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afd_user -d askfdalabel"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: askfdalabel-backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://afd_user:afd_password@db:5432/askfdalabel
      BACKEND_PORT: 8000
      HOST: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: askfdalabel-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      BACKEND_URL: http://backend:8000
      BACKEND_PORT: 8000
      HOST: 0.0.0.0
      FRONTEND_PORT: 3000
      FRONTEND_BASE_PATH: /askfdalabel
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/askfdalabel/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: always

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    container_name: askfdalabel-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/askfdalabel/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

networks:
  default:
    name: askfdalabel-network
