services:
  db:
    image: ankane/pgvector:latest
    container_name: askfdalabel-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: askfdalabel
      POSTGRES_USER: afd_user
      POSTGRES_PASSWORD: afd_password
    shm_size: '1gb'
    volumes:
      - ./database/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afd_user -d askfdalabel"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: askfdalabel-backend
    depends_on:
      - db
    expose:
      - "8842"
    env_file:
      - ./.env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://afd_user:afd_password@db:5432/askfdalabel
      BACKEND_PORT: 8842
      HOST: 0.0.0.0
    volumes:
      - ./data:/data
      - ./backend/webtest/results:/app/webtest/results
      - ./backend/webtest/history:/app/webtest/history
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8842/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: askfdalabel-frontend
    depends_on:
      - backend
    expose:
      - "8841"
    env_file:
      - ./.env
    environment:
      BACKEND_URL: http://backend:8842
      BACKEND_PORT: 8842
      HOST: 0.0.0.0
      FRONTEND_PORT: 8841
      FRONTEND_BASE_PATH: /askfdalabel
    volumes:
      - ./frontend/public:/app/public
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8841/askfdalabel/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: always

networks:
  default:
    name: apps-network
